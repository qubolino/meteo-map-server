server {
    listen 8765;

    location /meteo/ {
        alias /opt/meteo-map-server/generated_maps/;
        autoindex off;

        # Only expose PNG maps and the index
        location ~* \.(png|json)$ {
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin "*";
        }

        # Block everything else
        location ~ {
            return 403;
        }
    }
}

services:

  generator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    volumes:
      - gribs:/app/gribs
      - maps:/app/generated_maps
    # Run every 6 hours via supercronic
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8765:8765"
    volumes:
      - maps:/app/generated_maps:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - generator

volumes:
  gribs:
  maps:
